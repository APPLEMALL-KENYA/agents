{% extends "agents/base.html" %}
{% load static %}

{% block title %}Add Parcel{% endblock %}

{% block content %}
<div class="flex items-center justify-center px-4 py-8 sm:py-12">

  <div class="w-full max-w-xl bg-white shadow-2xl rounded-3xl p-6 sm:p-8 border border-gray-100 animate-fade-in">

    <!-- Header -->
    <h1 class="text-2xl sm:text-3xl font-bold text-center text-blue-700 mb-2 sm:mb-3">📦 Add New Parcel</h1>
    <p class="text-center text-gray-500 mb-5 sm:mb-6 text-sm sm:text-base">
      Fill in all the details below to register a new parcel.
    </p>

    <!-- Form -->
    <form method="POST" class="space-y-4 sm:space-y-5">
      {% csrf_token %}

      <!-- Tracking Code -->
      <div>
        <label class="block text-sm sm:text-base font-medium text-gray-700 mb-1">Tracking Code</label>
        <input type="text" name="tracking_code" value="{{ form.tracking_code.value|default_if_none:'' }}"
          class="w-full rounded-lg border border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-300 focus:ring-opacity-50 p-2 sm:p-3 text-sm sm:text-base"
          placeholder="Enter tracking number" required>
      </div>

      <!-- Customer Name -->
      <div>
        <label class="block text-sm sm:text-base font-medium text-gray-700 mb-1">Customer Name</label>
        <input type="text" name="customer_name" value="{{ form.customer_name.value|default_if_none:'' }}"
          class="w-full rounded-lg border border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-300 focus:ring-opacity-50 p-2 sm:p-3 text-sm sm:text-base"
          placeholder="Enter customer name" required>
      </div>

      <!-- Customer Phone -->
      <div>
        <label class="block text-sm sm:text-base font-medium text-gray-700 mb-1">Customer Phone</label>
        <input type="text" name="customer_phone" value="{{ form.customer_phone.value|default_if_none:'' }}"
          class="w-full rounded-lg border border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-300 focus:ring-opacity-50 p-2 sm:p-3 text-sm sm:text-base"
          placeholder="e.g. +254700000000" required>
      </div>

      <!-- Destination -->
      <div>
        <label class="block text-sm sm:text-base font-medium text-gray-700 mb-1">Destination</label>
        <input type="text" name="destination" value="{{ form.destination.value|default_if_none:'' }}"
          class="w-full rounded-lg border border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-300 focus:ring-opacity-50 p-2 sm:p-3 text-sm sm:text-base"
          placeholder="Enter parcel destination" required>
      </div>

      <!-- Parcel Weight -->
      <div>
        <label class="block text-sm sm:text-base font-medium text-gray-700 mb-1">Weight (kg)</label>
        <input type="number" step="0.01" name="weight" value="{{ form.weight.value|default_if_none:'' }}"
          class="w-full rounded-lg border border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-300 focus:ring-opacity-50 p-2 sm:p-3 text-sm sm:text-base"
          placeholder="Parcel weight in kg" required>
      </div>

      <!-- Parcel Description -->
      <div>
        <label class="block text-sm sm:text-base font-medium text-gray-700 mb-1">Description</label>
        <textarea name="description"
          class="w-full rounded-lg border border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-300 focus:ring-opacity-50 p-2 sm:p-3 text-sm sm:text-base"
          placeholder="Optional parcel description">{{ form.description.value|default_if_none:'' }}</textarea>
      </div>

      <!-- Status -->
      <div>
        <label class="block text-sm sm:text-base font-medium text-gray-700 mb-1">Status</label>
        <select name="status"
          class="w-full rounded-lg border border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-300 focus:ring-opacity-50 p-2 sm:p-3 text-sm sm:text-base">
          <option value="pending" {% if form.status.value == 'pending' %}selected{% endif %}>Pending</option>
          <option value="received" {% if form.status.value == 'received' %}selected{% endif %}>Received</option>
        </select>
      </div>

      <!-- Submit Button -->
      <button type="submit"
        class="w-full py-3 sm:py-3 rounded-lg bg-blue-600 text-white text-lg font-semibold shadow-lg hover:bg-blue-700 transform hover:scale-[1.02] transition duration-300">
        ➕ Save Parcel
      </button>
    </form>

    <!-- Divider -->
    <div class="flex items-center my-6">
      <span class="flex-1 border-t border-gray-300"></span>
      <span class="px-3 text-gray-400 text-sm">or</span>
      <span class="flex-1 border-t border-gray-300"></span>
    </div>

    <!-- Back to Dashboard -->
    <div class="text-center">
      <a href="{% url 'agents:dashboard' %}"
        class="inline-block px-4 sm:px-5 py-2 sm:py-2 text-blue-600 font-medium border border-blue-200 rounded-lg hover:bg-blue-50 hover:text-blue-800 transition duration-300 text-sm sm:text-base">
        ← Back to Dashboard
      </a>
    </div>

  </div>
</div>
{% endblock %}
