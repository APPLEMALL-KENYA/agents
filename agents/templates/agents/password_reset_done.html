{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset Sent</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg text-center">
    <h2 class="text-2xl font-bold text-gray-800 mb-4">Check Your Email</h2>
    <p class="text-gray-600">
      We’ve sent you instructions to reset your password.
      Please check your inbox and follow the link provided.
    </p>

    <a href="{% url 'login' %}" 
       class="mt-6 inline-block bg-orange-500 text-white px-6 py-3 rounded-lg shadow hover:bg-orange-600 transition">
       Back to Login
    </a>
  </div>

</body>
</html>
