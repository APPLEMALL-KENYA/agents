{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shops</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">

<div class="max-w-7xl mx-auto mt-10 bg-white shadow-xl rounded-2xl p-8">
    <h1 class="text-3xl font-bold text-blue-700 mb-6 text-center">🏬 All Shops</h1>
    <table class="min-w-full border border-gray-200 rounded-lg overflow-hidden">
        <thead class="bg-blue-600 text-white">
            <tr>
                <th class="px-6 py-3 text-left">Name</th>
                <th class="px-6 py-3 text-left">Location</th>
                <th class="px-6 py-3 text-left">Phone</th>
                <th class="px-6 py-3 text-left">Email</th>
                <th class="px-6 py-3 text-left">Created</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
            {% for shop in shops %}
            <tr class="hover:bg-gray-100">
                <td class="px-6 py-4 font-medium">{{ shop.name }}</td>
                <td class="px-6 py-4">{{ shop.location }}</td>
                <td class="px-6 py-4">{{ shop.phone }}</td>
                <td class="px-6 py-4">{{ shop.email }}</td>
                <td class="px-6 py-4">{{ shop.created_at|date:"M d, Y" }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" class="text-center py-5 text-gray-500">No shops found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
