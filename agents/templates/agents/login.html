{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Dot Loader */
    .dot-loader {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
    }
    .dot-loader div {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot-loader div:nth-child(1) { background: orange; animation-delay: 0s; }
    .dot-loader div:nth-child(2) { background: #ffae42; animation-delay: 0.1s; }
    .dot-loader div:nth-child(3) { background: #ffd166; animation-delay: 0.2s; }
    .dot-loader div:nth-child(4) { background: #a2de74; animation-delay: 0.3s; }
    .dot-loader div:nth-child(5) { background: green; animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
      40% { transform: scale(1.3); opacity: 1; }
    }
  </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen relative">

  <!-- Login Card -->
  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg relative z-10">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Agent Login</h2>

    <form method="POST" id="loginForm" class="space-y-5">
      {% csrf_token %}

      <!-- Username -->
      <div>
        <label for="id_username" class="block text-sm font-medium text-gray-600">
          Username or Email
        </label>
        <input type="text" name="username" id="id_username"
               class="mt-1 w-full px-4 py-3 border rounded-lg shadow-sm 
                      focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none"
               placeholder="Enter username or email" required>
      </div>

      <!-- Password -->
      <div>
        <label for="id_password" class="block text-sm font-medium text-gray-600">Password</label>
        <input type="password" name="password" id="id_password"
               class="mt-1 w-full px-4 py-3 border rounded-lg shadow-sm 
                      focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none"
               placeholder="Enter password" required>
      </div>

      <!-- Submit -->
      <button type="submit"
              class="w-full bg-orange-500 text-white font-semibold py-3 rounded-lg 
                     hover:bg-orange-600 transition duration-200 shadow-md">
        Login
      </button>
    </form>
  </div>
<!-- Loader overlay -->
<div id="loaderOverlay" 
     class="fixed inset-0 bg-white bg-opacity-95 hidden z-50 
            flex items-center justify-center">
  
  <div class="flex flex-col items-center">
    <!-- Logo -->
    <img src="https://tse1.mm.bing.net/th/id/OIP.2vC7fIFrtEfb9S9DwVyDVAAAAA?pid=Api&h=220&P=0" 
         alt="Logo" class="w-20 h-20 mb-6">

    <!-- Straight dotted animation -->
    <div class="flex space-x-2 mb-4">
      <div class="w-3 h-3 rounded-full bg-orange-500 animate-bounce"></div>
      <div class="w-3 h-3 rounded-full bg-yellow-500 animate-bounce delay-150"></div>
      <div class="w-3 h-3 rounded-full bg-green-500 animate-bounce delay-300"></div>
    </div>

    <!-- Status text -->
    <p id="loaderStatus" class="text-gray-700 font-medium text-lg">Authenticating...</p>
  </div>
</div>


    <!-- Logo -->
    <img src="https://tse1.mm.bing.net/th/id/OIP.2vC7fIFrtEfb9S9DwVyDVAAAAA?pid=Api&h=220&P=0"
         alt="Logo"
         class="w-16 h-16 mb-6">

    <!-- Straight Line Dots -->
    <div class="dot-loader">
      <div></div><div></div><div></div><div></div><div></div>
    </div>

    <!-- Status -->
    <p id="loaderStatus" class="text-lg font-semibold text-gray-700 mt-6">Authenticating...</p>
  </div>

  <!-- JS -->
  <script>
    const form = document.getElementById("loginForm");
    const loader = document.getElementById("loaderOverlay");
    const statusText = document.getElementById("loaderStatus");

    // Show loader on form submit
    form.addEventListener("submit", () => {
      loader.classList.remove("hidden");
      statusText.textContent = "Authenticating...";
    });

    // Wrong credentials feedback from Django context
    {% if form.errors %}
      window.addEventListener("DOMContentLoaded", () => {
        loader.classList.remove("hidden");
        statusText.textContent = "❌ Wrong credentials";
        statusText.classList.add("text-red-500");
      });
    {% endif %}

    // Success feedback if redirected with flag
    {% if messages %}
      {% for message in messages %}
        {% if "success" in message.tags %}
          window.addEventListener("DOMContentLoaded", () => {
            loader.classList.remove("hidden");
            statusText.textContent = "✅ Login successful";
            statusText.classList.add("text-green-600");
          });
        {% endif %}
      {% endfor %}
    {% endif %}
  </script>

</body>
</html>
