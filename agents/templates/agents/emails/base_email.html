<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; background:#f9fafb; padding:20px; }
    .container { background:white; max-width:600px; margin:auto; padding:20px; border-radius:10px; }
    .header { text-align:center; margin-bottom:20px; }
    .footer { text-align:center; margin-top:30px; font-size:12px; color:#777; }
    .btn { background:#f97316; color:white; padding:10px 20px; text-decoration:none; border-radius:6px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="https://tse1.mm.bing.net/th/id/OIP.2vC7fIFrtEfb9S9DwVyDVAAAAA?pid=Api&h=220&P=0" 
           alt="Applemall Logo" width="80">
    </div>

    {% block content %}{% endblock %}

    <div class="footer">
      &copy; {{ year }} Applemall. All rights reserved.
    </div>
  </div>
</body>
</html>
