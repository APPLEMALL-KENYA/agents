{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Applemall</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

<!-- Header -->
<header class="bg-yellow-400 text-white p-4 shadow">
  <div class="container mx-auto flex justify-between items-center">
    <h1 class="text-xl font-bold">Dashboard</h1>
    <div>
      <span class="mr-4">Hello, {{ request.user.username }}</span>
      <a href="{% url 'logout' %}" class="bg-white text-yellow-500 px-3 py-1 rounded hover:bg-gray-100">Logout</a>
    </div>
  </div>
</header>

<!-- Numeric Summary Cards -->
<div class="container mx-auto mt-6 grid grid-cols-1 md:grid-cols-4 gap-6">

  <a href="{% url 'agents:shop_list' %}" class="block bg-white shadow rounded p-4 hover:shadow-lg transition">
    <h2 class="font-bold text-lg">Total Shops</h2>
    <p class="text-2xl mt-2">{{ total_shops }}</p>
  </a>

  <a href="{% url 'agents:agent_list' %}" class="block bg-white shadow rounded p-4 hover:shadow-lg transition">
    <h2 class="font-bold text-lg">Total Agents</h2>
    <p class="text-2xl mt-2">{{ total_agents }}</p>
  </a>

  <a href="{% url 'agents:parcel_list' %}" class="block bg-white shadow rounded p-4 hover:shadow-lg transition">
    <h2 class="font-bold text-lg">Total Parcels</h2>
    <p class="text-2xl mt-2">{{ total_parcels }}</p>
  </a>

  <a href="{% url 'agents:parcel_list' %}?status=pending" class="block bg-white shadow rounded p-4 hover:shadow-lg transition">
    <h2 class="font-bold text-lg">Pending Parcels</h2>
    <p class="text-2xl mt-2">{{ total_pending_parcels }}</p>
  </a>

</div>

</body>
</html>
