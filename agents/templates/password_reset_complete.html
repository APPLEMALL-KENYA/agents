{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset Complete</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg text-center">
    <div class="flex justify-center mb-4">
      <!-- Success Check Icon -->
      <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"
           xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M5 13l4 4L19 7" />
      </svg>
    </div>

    <h2 class="text-2xl font-bold text-gray-800 mb-2">Password Reset Successful</h2>
    <p class="text-gray-600 text-sm mb-6">
      Your password has been set. You may now log in with your new credentials.
    </p>

    <a href="{% url 'login' %}" 
       class="inline-block bg-orange-500 text-white font-semibold px-6 py-3 rounded-lg shadow hover:bg-orange-600 transition">
      Go to Login
    </a>
  </div>

</body>
</html>
