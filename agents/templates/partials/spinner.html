<div id="loading-overlay" class="hidden">
    <div class="loader-box">
      <img id="loader-logo" src="{% static 'images/logo.png' %}" alt="Logo" class="logo-spin">
      <div id="loader-status" class="status-icon hidden">✅</div>
    </div>
  </div>
  
  <style>
    .hidden { display: none; }
  
    #loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
    }
  
    .loader-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
  
    .logo-spin {
      width: 70px;
      height: 70px;
      animation: spin 1s linear infinite;
    }
  
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  
    .status-icon {
      font-size: 2rem;
    }
  </style>
