{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Reset</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Reset Your Password</h2>

    <form method="POST">
      {% csrf_token %}
      <div class="mb-4">
        <label for="id_email" class="block text-sm font-medium text-gray-600">Email Address</label>
        <input type="email" name="email" id="id_email"
               class="mt-1 w-full px-4 py-3 border rounded-lg shadow-sm focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none"
               placeholder="Enter your registered email" required>
      </div>

      <button type="submit"
              class="w-full bg-orange-500 text-white font-semibold py-3 rounded-lg hover:bg-orange-600 transition duration-200 shadow-md">
        Send Reset Link
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500">
      Back to <a href="{% url 'login' %}" class="text-orange-500 hover:underline">Login</a>
    </p>
  </div>

</body>
</html>
